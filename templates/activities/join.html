<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Beitreten</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-2xl items-center px-4 py-10 sm:px-6">
        <section class="w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
            <div class="mb-6">
                <h1 class="text-3xl font-bold tracking-tight">{{ session.title }}</h1>
                <p class="mt-2 text-sm text-slate-600">
                    Bitte Namen oder Pseudonym eingeben, um der Activity beizutreten.
                </p>
            </div>

            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div class="rounded-lg bg-slate-50 p-4 ring-1 ring-inset ring-slate-200">
                    <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Typ</div>
                    <div class="mt-2 text-sm font-medium text-slate-900">{{ session.type }}</div>
                </div>

                <div class="rounded-lg bg-slate-50 p-4 ring-1 ring-inset ring-slate-200">
                    <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Join-Code</div>
                    <div class="mt-2 font-mono text-lg font-bold tracking-wide text-slate-900">{{ session.join_code }}
                    </div>
                </div>
            </div>

            {% if error %}
            <div class="mt-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="mt-6 space-y-5">
                <div>
                    <label for="display_name" class="mb-1.5 block text-sm font-medium text-slate-700">
                        Name oder Pseudonym
                    </label>
                    <input id="display_name" name="display_name" placeholder="z. B. Ali / Team Rot"
                        class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200" />
                </div>

                <div class="pt-1">
                    <button type="submit"
                        class="inline-flex items-center rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-slate-800">
                        Beitreten
                    </button>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
