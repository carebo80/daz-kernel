<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Visitenkarten</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-2xl px-4 py-8 sm:px-6">
        <div class="mb-6">
            <h1 class="text-3xl font-bold tracking-tight">{{ participant.template_title }}</h1>
            <p class="mt-2 text-sm text-slate-600">
                Teilnahme als: <span class="font-medium text-slate-800">{{ participant.display_name }}</span>
            </p>
        </div>

        <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
            <form method="post" action="/activity/visitenkarten/{{ participant.id }}" class="space-y-5">
                {% for field in fields %}
                <div>
                    <label for="{{ field }}" class="mb-1.5 block text-sm font-medium text-slate-700">
                        {{ field|capitalize }}
                    </label>

                    {% if field == "adresse" %}
                    <textarea id="{{ field }}" name="{{ field }}" rows="3"
                        class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"></textarea>
                    {% elif field == "email" %}
                    <input id="{{ field }}" name="{{ field }}" type="email"
                        class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200" />
                    {% else %}
                    <input id="{{ field }}" name="{{ field }}" type="text"
                        class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200" />
                    {% endif %}
                </div>
                {% endfor %}

                <div class="pt-2">
                    <button type="submit"
                        class="inline-flex items-center rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-slate-800">
                        Senden
                    </button>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
